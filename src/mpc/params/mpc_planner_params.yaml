/mpc_planner:
  ros__parameters:
    # backend_class: mpc.mppi_algorithm:MPPIController
    backend_class: mpc.nmpc_algorithm:NMPCController
    pose_topic: /robot_pose
    cmd_vel_topic: /cmd_vel

    control_rate: 5.0
    dt: 0.2
    seed: 7

    goal_x: 3.5
    goal_y: 2.5
    goal_theta: 0.0

    v_min: 0.0
    v_max: 0.5
    omega_max: 1.0

    x_knots: [-5.0, -3.0, -1.0, 1.0, 3.0, 5.0]
    y_low_knots: [2.0, 2.4, 2.6, 2.6, 2.4, 2.0]
    y_high_knots: [4.0, 4.4, 4.6, 4.6, 4.4, 4.0]

    w_pos: 2.0
    w_theta: 0.1
    w_u: 0.05
    w_corr: 5000.0

    ## MPPI backend params
    mppi.n_traj: 128
    mppi.horizon: 32
    mppi.noise_sigma_v: 0.7
    mppi.noise_sigma_omega: 0.6
    mppi.temperature: 1.0
    mppi.w_du: 0.25

    ## NMPC backend params
    mpc.N: 20  # NOTE: To minimize ROS tracking error, setting the future steps
                # `N` higher will help, but setting it too high will slow down
                # the algorithm's planning speed.
    mpc.w_du: 0.2
    mpc.w_pos_T: 50.0
    mpc.w_theta_T: 10.0
    mpc.solver_max_iter: 1000
    mpc.solver_tol: 1.0e-3
    mpc.solver_constr_viol_tol: 1.0e-2

robot_pose_publisher:
  ros__parameters:
    pose_topic: /robot_pose
    source_frame_id: base_link
    target_frame_id: map
    update_rate: 30.0
    use_sim_time: true